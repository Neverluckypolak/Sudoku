<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sudoku</title>

  <!-- PWA-ish bits (your manifest + icons live in repo root) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root{
      --bg:#0b0f16;
      --panel:#111827;
      --panel2:#0f172a;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --line:#334155;
      --line2:#64748b;
      --accent:#60a5fa;
      --bad:#fb7185;
      --good:#34d399;
      --cell:#0f1220;
      --cell2:#0b152a;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helveticaica,Arial,"Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 50% -10%, #16233a 0%, var(--bg) 55%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      justify-content:center;
    }
    .app{
      width:min(520px, 100%);
      padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom)) 12px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    h1{
      font-size:18px;
      margin:0;
      font-weight:700;
      letter-spacing:.3px;
    }
    .topBtns{
      display:flex; gap:10px; align-items:center;
    }
    button{
      border:1px solid rgba(100,116,139,.45);
      background: linear-gradient(180deg, rgba(17,24,39,.95) 0%, rgba(15,23,42,.95) 100%);
      color:var(--text);
      padding:10px 12px;
      border-radius:14px;
      font-weight:650;
      font-size:14px;
      line-height:1;
      cursor:pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    button:active{ transform: translateY(1px); }
    button[disabled]{
      opacity:.45;
      cursor:not-allowed;
      filter:saturate(.6);
    }
    .btnGhost{
      background: transparent;
      border:1px solid rgba(100,116,139,.35);
      box-shadow:none;
    }

    .panel{
      background: linear-gradient(180deg, rgba(17,24,39,.82) 0%, rgba(15,23,42,.82) 100%);
      border:1px solid rgba(100,116,139,.25);
      border-radius:18px;
      padding:12px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }

    .statusRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }
    .statusLeft{
      font-size:14px;
      color:var(--muted);
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    .pill{
      border:1px solid rgba(100,116,139,.35);
      background: rgba(2,6,23,.35);
      padding:6px 10px;
      border-radius:999px;
      color:var(--muted);
      font-size:13px;
    }
    .toggles{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:140px;
      align-items:stretch;
    }
    .toggle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(100,116,139,.25);
      background: rgba(2,6,23,.25);
      color:var(--muted);
      font-weight:650;
    }
    .toggle input{ width:18px; height:18px; }

    .boardWrap{
      background: linear-gradient(180deg, rgba(2,6,23,.35) 0%, rgba(2,6,23,.15) 100%);
      border:1px solid rgba(100,116,139,.25);
      border-radius:18px;
      padding:10px;
    }
    #board{
      display:grid;
      grid-template-columns:repeat(9, 1fr);
      gap:0;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(100,116,139,.35);
    }
    .cell{
      position:relative;
      aspect-ratio: 1 / 1;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:20px;
      background: linear-gradient(180deg, rgba(15,18,32,.95) 0%, rgba(11,21,42,.95) 100%);
      border-right:1px solid rgba(100,116,139,.25);
      border-bottom:1px solid rgba(100,116,139,.25);
      user-select:none;
    }
    .cell:nth-child(9n){ border-right:none; }

    /* 3x3 box thicker lines */
    .cell.boxR{ border-right:2px solid rgba(148,163,184,.65); }
    .cell.boxB{ border-bottom:2px solid rgba(148,163,184,.65); }

    .cell.fixed{
      color:#e2e8f0;
      background: linear-gradient(180deg, rgba(17,24,39,.95) 0%, rgba(15,23,42,.95) 100%);
    }
    .cell.selected{
      outline: 2px solid rgba(96,165,250,.85);
      outline-offset:-2px;
      z-index:2;
    }
    .cell.related{
      background: linear-gradient(180deg, rgba(8,14,30,.95) 0%, rgba(9,18,36,.95) 100%);
    }

    /* Brighter same-number highlight (your request) */
    .cell.same{
      box-shadow:
        0 0 0 3px rgba(96,165,250,.65) inset,
        0 0 18px rgba(96,165,250,.25);
      background: linear-gradient(180deg, rgba(20,60,110,.80) 0%, rgba(10,22,45,.85) 100%);
    }

    .cell.bad{
      color: var(--bad);
    }

    .notes{
      position:absolute;
      inset:3px;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      grid-template-rows:repeat(3, 1fr);
      gap:0;
      font-size:10px;
      font-weight:700;
      color:rgba(229,231,235,.65);
      align-items:center;
      justify-items:center;
    }
    .notes span.off{ opacity:.15; }

    .pad{
      display:grid;
      grid-template-columns:repeat(9, 1fr);
      gap:8px;
    }
    .pad button{
      padding:12px 0;
      border-radius:16px;
      font-size:16px;
      font-weight:800;
    }

    .actions{
      display:grid;
      gap:10px;
      grid-template-columns: repeat(7, 1fr);
      align-items:stretch;
    }
    .danger{ border-color: rgba(244,63,94,.45); }
    .hint{ border-color: rgba(34,197,94,.45); }
    .primary{ border-color: rgba(96,165,250,.55); }
    .secondary{ border-color: rgba(148,163,184,.35); }

    .toast{
      position:fixed;
      left:50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      background: rgba(2,6,23,.88);
      border:1px solid rgba(148,163,184,.25);
      color:var(--text);
      padding:10px 14px;
      border-radius:14px;
      font-weight:700;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease, transform .18s ease;
    }
    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(-4px);
    }

    .gameOverMask{
      position:absolute;
      inset:0;
      background: rgba(2,6,23,.55);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      letter-spacing:.6px;
      color: rgba(229,231,235,.95);
      font-size:18px;
      text-align:center;
      padding:20px;
      backdrop-filter: blur(3px);
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <h1>Sudoku</h1>
      <div class="topBtns">
        <button class="btnGhost" id="newBtn">New</button>
        <button class="btnGhost" id="diffBtn">Medium</button>
        <button class="btnGhost" id="undoBtn">Undo</button>
      </div>
    </header>

    <div class="panel">
      <div class="statusRow">
        <div class="statusLeft">
          <span class="pill"><b id="filled">0</b>/81 filled • <span id="timer">00:00</span></span>
          <span class="pill" id="strikeDisplay" style="display:none;"></span>
        </div>

        <div class="toggles">
          <label class="toggle"><span>Notes</span><input type="checkbox" id="notesToggle"></label>
          <label class="toggle"><span>Mistakes</span><input type="checkbox" id="mistakeToggle" checked></label>
        </div>
      </div>
    </div>

    <div class="boardWrap panel" style="position:relative;">
      <div id="board"></div>
      <div id="gameOverMask" class="gameOverMask" style="display:none;">Game Over<br>(3 strikes)</div>
    </div>

    <div class="panel">
      <div class="actions">
        <button class="danger" id="eraseBtn">Erase</button>
        <button class="hint" id="hintBtn">Hint</button>
        <button class="secondary" id="saveBtn">Save</button>
        <button class="secondary" id="loadBtn">Load</button>
        <button class="secondary" id="finishBtn" disabled>Finish</button>
        <button class="primary" id="solveBtn">Solve</button>
        <button class="secondary" id="resetBtn">Reset</button>
      </div>

      <div style="height:10px"></div>

      <div class="pad" id="pad"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (() => {
    // -------- Utilities --------
    const $ = (sel) => document.querySelector(sel);
    const boardEl = $("#board");
    const padEl = $("#pad");
    const toastEl = $("#toast");
    const gameOverMask = $("#gameOverMask");

    const clamp = (n, a, b) => Math.max(a, Math.min(b, n));

    function toast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => toastEl.classList.remove("show"), 1400);
    }

    // -------- Sudoku Core --------
    const SIZE = 9;
    const BOX = 3;
    const DIGITS = [1,2,3,4,5,6,7,8,9];

    function makeEmpty(){
      return Array.from({length:SIZE}, () => Array(SIZE).fill(0));
    }
    function copyGrid(g){ return g.map(row => row.slice()); }

    function shuffle(arr){
      for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function isSafe(g, r, c, v){
      for(let x=0;x<SIZE;x++){
        if(g[r][x] === v) return false;
        if(g[x][c] === v) return false;
      }
      const br = Math.floor(r/BOX)*BOX;
      const bc = Math.floor(c/BOX)*BOX;
      for(let rr=br; rr<br+BOX; rr++){
        for(let cc=bc; cc<bc+BOX; cc++){
          if(g[rr][cc] === v) return false;
        }
      }
      return true;
    }

    function findEmpty(g){
      for(let r=0;r<SIZE;r++){
        for(let c=0;c<SIZE;c++){
          if(g[r][c] === 0) return [r,c];
        }
      }
      return null;
    }

    function solveGrid(g){
      const spot = findEmpty(g);
      if(!spot) return true;
      const [r,c] = spot;
      const nums = shuffle(DIGITS.slice());
      for(const v of nums){
        if(isSafe(g,r,c,v)){
          g[r][c] = v;
          if(solveGrid(g)) return true;
          g[r][c] = 0;
        }
      }
      return false;
    }

    function countSolutions(g, limit=2){
      // backtracking count up to limit
      const spot = findEmpty(g);
      if(!spot) return 1;
      const [r,c] = spot;
      let count = 0;
      for(const v of DIGITS){
        if(isSafe(g,r,c,v)){
          g[r][c] = v;
          count += countSolutions(g, limit - count);
          g[r][c] = 0;
          if(count >= limit) return count;
        }
      }
      return count;
    }

    function randInt(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }

    function diffToClues(diff){
      if(diff==="Easy") return randInt(36, 42);
      if(diff==="Medium") return randInt(30, 35);
      if(diff==="Hard") return randInt(24, 29);
      if(diff==="Impossible") return randInt(17, 22);
      return 32;
    }

    function generatePuzzle(diff){
      // 1) make solved grid
      const g = makeEmpty();
      solveGrid(g);
      const sol = copyGrid(g);

      // 2) remove numbers while maintaining uniqueness
      const cluesTarget = diffToClues(diff);
      const cells = [];
      for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) cells.push([r,c]);
      shuffle(cells);

      let puzzle = copyGrid(sol);
      let clues = 81;

      for(const [r,c] of cells){
        if(clues <= cluesTarget) break;

        const backup = puzzle[r][c];
        puzzle[r][c] = 0;

        const tmp = copyGrid(puzzle);
        const nsol = countSolutions(tmp, 2);
        if(nsol !== 1){
          puzzle[r][c] = backup; // revert
        } else {
          clues--;
        }
      }
      return { puzzle, sol };
    }

    // -------- Game State --------
    let difficulty = "Medium";
    let solution = null;
    let initial = null;
    let grid = null;

    // notes[r][c] => Set of digits
    let notes = Array.from({length:9}, () => Array.from({length:9}, () => new Set()));
    let fixed = new Set(); // "r,c"
    let selected = {r:0,c:0};

    let strikes = 0;
    let gameOver = false;

    let undoStack = [];
    function keyOf(r,c){ return `${r},${c}`; }
    function isFixed(r,c){ return fixed.has(keyOf(r,c)); }

    // timer
    let t0 = Date.now();
    let timerInt = null;

    function fmtTime(sec){
      const m = Math.floor(sec/60);
      const s = sec%60;
      return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }
    function updateTimer(){
      const sec = Math.floor((Date.now() - t0)/1000);
      $("#timer").textContent = fmtTime(sec);
    }
    function startTimer(){
      t0 = Date.now();
      clearInterval(timerInt);
      timerInt = setInterval(updateTimer, 250);
      updateTimer();
    }

    function resetNotes(){
      notes = Array.from({length:9}, () => Array.from({length:9}, () => new Set()));
    }

    function pushUndo(entry){
      undoStack.push(entry);
      if(undoStack.length > 200) undoStack.shift();
    }

    // -------- Save / Load --------
    const SAVE_KEY = "sudoku_save_v2";

    function serializeNotes(n){
      return n.map(row => row.map(set => Array.from(set)));
    }
    function deserializeNotes(raw){
      return raw.map(row => row.map(arr => new Set(arr)));
    }
    function getElapsedSeconds(){
      return Math.floor((Date.now() - t0) / 1000);
    }

    function saveGame(auto=false){
      try{
        const payload = {
          version: 2,
          difficulty,
          solution,
          initial,
          grid,
          fixed: Array.from(fixed),
          notes: serializeNotes(notes),
          elapsed: getElapsedSeconds(),
          selected,
          strikes,
          gameOver
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
        if(!auto) toast("Saved");
      } catch(e){
        if(!auto) toast("Save failed");
      }
    }

    function loadGame(){
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw){ toast("No save found"); return; }
      try{
        const p = JSON.parse(raw);

        difficulty = p.difficulty || "Medium";
        $("#diffBtn").textContent = difficulty;

        solution = p.solution;
        initial = p.initial;
        grid = p.grid;

        fixed = new Set(p.fixed || []);
        notes = p.notes ? deserializeNotes(p.notes) : notes;
        selected = p.selected || {r:0,c:0};

        strikes = p.strikes || 0;
        gameOver = !!p.gameOver;

        // restore timer
        const elapsed = Number.isFinite(p.elapsed) ? p.elapsed : 0;
        clearInterval(timerInt);
        t0 = Date.now() - elapsed*1000;
        timerInt = setInterval(updateTimer, 250);
        updateTimer();

        render();
        toast("Loaded");
      } catch(e){
        toast("Load failed");
      }
    }

    // -------- Finish helpers --------
    function emptyCount(){
      let n = 0;
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) if(grid[r][c]===0) n++;
      return n;
    }

    function hasMistakes(){
      // if Mistakes toggle is off, we still block Finish if actual wrong values exist
      for(let r=0;r<9;r++){
        for(let c=0;c<9;c++){
          const v = grid[r][c];
          if(v !== 0 && v !== solution[r][c]) return true;
        }
      }
      return false;
    }

    function finishRest(){
      if(gameOver) return;

      const left = emptyCount();
      if(left > 9){
        toast("Finish unlocks at 9 remaining");
        return;
      }
      if(hasMistakes()){
        toast("Fix mistakes first");
        return;
      }

      pushUndo({ type:"finishAll", prevGrid: copyGrid(grid), prevNotes: serializeNotes(notes) });

      for(let r=0;r<9;r++){
        for(let c=0;c<9;c++){
          if(grid[r][c] === 0){
            grid[r][c] = solution[r][c];
            notes[r][c].clear();
          }
        }
      }
      render();
      saveGame(true);
      toast("Finished!");
    }

    // -------- UI / Rendering --------
    function setSelected(r,c){
      selected = {r,c};
      render();
    }

    function cellClasses(r,c){
      const cls = ["cell"];
      if((c+1)%3===0 && c!==8) cls.push("boxR");
      if((r+1)%3===0 && r!==8) cls.push("boxB");

      const v = grid[r][c];
      if(isFixed(r,c)) cls.push("fixed");

      if(r===selected.r && c===selected.c) cls.push("selected");

      // related row/col/box
      const sr = selected.r, sc = selected.c;
      const inSameRow = r===sr;
      const inSameCol = c===sc;
      const inSameBox = Math.floor(r/3)===Math.floor(sr/3) && Math.floor(c/3)===Math.floor(sc/3);
      if(inSameRow || inSameCol || inSameBox) cls.push("related");

      // same number highlight
      const sv = grid[sr][sc];
      if(sv !== 0 && v === sv) cls.push("same");

      // mistakes highlight
      if($("#mistakeToggle").checked && v!==0 && v !== solution[r][c]) cls.push("bad");

      return cls.join(" ");
    }

    function renderBoard(){
      boardEl.innerHTML = "";
      for(let r=0;r<9;r++){
        for(let c=0;c<9;c++){
          const v = grid[r][c];
          const d = document.createElement("div");
          d.className = cellClasses(r,c);
          d.dataset.r = r;
          d.dataset.c = c;

          if(v !== 0){
            d.textContent = String(v);
          } else {
            // notes display if Notes toggle ON
            if($("#notesToggle").checked){
              const wrap = document.createElement("div");
              wrap.className = "notes";
              for(let k=1;k<=9;k++){
                const s = document.createElement("span");
                const has = notes[r][c].has(k);
                s.textContent = k;
                if(!has) s.className = "off";
                wrap.appendChild(s);
              }
              d.appendChild(wrap);
            } else {
              d.textContent = "";
            }
          }

          d.addEventListener("click", () => {
            if(gameOver) return;
            setSelected(r,c);
          });

          boardEl.appendChild(d);
        }
      }
    }

    function renderPad(){
      padEl.innerHTML = "";
      for(const n of DIGITS){
        const b = document.createElement("button");
        b.className = "btnGhost";
        b.textContent = n;
        b.addEventListener("click", () => {
          if(gameOver) return;
          const noteMode = $("#notesToggle").checked;
          if(noteMode) toggleNoteDigit(n);
          else placeDigit(n);
        });
        padEl.appendChild(b);
      }
    }

    function updateStatus(){
      let filled = 0;
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) if(grid[r][c]!==0) filled++;
      $("#filled").textContent = filled;

      // strikes display only on Impossible
      const sd = $("#strikeDisplay");
      if(difficulty === "Impossible"){
        sd.style.display = "inline-block";
        sd.textContent = `Strikes: ${strikes}/3`;
      } else {
        sd.style.display = "none";
        sd.textContent = "";
      }

      // Finish button enable logic
      const left = emptyCount();
      const finishBtn = $("#finishBtn");
      finishBtn.disabled = gameOver || left > 9;
      finishBtn.textContent = left <= 9 ? `Finish (${left})` : "Finish";

      // Hint button disabled on Impossible or gameOver
      const hintBtn = $("#hintBtn");
      hintBtn.disabled = gameOver || difficulty === "Impossible";

      // gameover overlay
      gameOverMask.style.display = gameOver ? "flex" : "none";
    }

    function render(){
      renderBoard();
      renderPad();
      updateStatus();
    }

    // -------- Gameplay actions --------
    function placeDigit(d){
      if(gameOver) return;

      const r = selected.r, c = selected.c;
      if(isFixed(r,c)) return;

      const prev = grid[r][c];
      if(prev === d) return;

      pushUndo({type:"place", r,c, prev, prevNotes: Array.from(notes[r][c])});
      grid[r][c] = d;
      notes[r][c].clear();

      // Impossible: count strikes
      if(difficulty === "Impossible"){
        if(d !== solution[r][c]){
          strikes++;
          toast(`Strike ${strikes}/3`);
          if(strikes >= 3){
            gameOver = true;
            render();
            saveGame(true);
            toast("Game Over (3 strikes)");
            return;
          }
        }
      }

      render();
      saveGame(true);
    }

    function erase(){
      if(gameOver) return;

      const r = selected.r, c = selected.c;
      if(isFixed(r,c)) return;

      const prev = grid[r][c];
      if(prev === 0) return;

      pushUndo({type:"erase", r,c, prev, prevNotes: Array.from(notes[r][c])});
      grid[r][c] = 0;
      render();
      saveGame(true);
    }

    function toggleNoteDigit(d){
      if(gameOver) return;

      const r = selected.r, c = selected.c;
      if(isFixed(r,c)) return;
      if(grid[r][c] !== 0) return;

      pushUndo({type:"note", r,c, prevNotes: Array.from(notes[r][c])});
      if(notes[r][c].has(d)) notes[r][c].delete(d);
      else notes[r][c].add(d);

      render();
      saveGame(true);
    }

    function giveHint(){
      if(gameOver) return;

      if(difficulty === "Impossible"){
        toast("No hints in Impossible mode");
        return;
      }

      // find an empty cell
      const empties = [];
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) if(grid[r][c]===0) empties.push([r,c]);
      if(empties.length===0){ toast("No empty cells"); return; }

      const [r,c] = empties[Math.floor(Math.random()*empties.length)];
      if(isFixed(r,c)) return;

      pushUndo({type:"hint", r,c, prev:grid[r][c], prevNotes:Array.from(notes[r][c])});
      grid[r][c] = solution[r][c];
      notes[r][c].clear();

      render();
      saveGame(true);
      toast("Hint used");
    }

    function solveNow(){
      if(gameOver) return;

      pushUndo({type:"solve", prevGrid:copyGrid(grid), prevNotes:serializeNotes(notes)});
      grid = copyGrid(solution);
      resetNotes();
      render();
      saveGame(true);
      toast("Solved");
    }

    function resetToInitial(){
      if(gameOver) return;

      pushUndo({type:"reset", prevGrid:copyGrid(grid), prevNotes:serializeNotes(notes)});
      grid = copyGrid(initial);
      resetNotes();

      // rebuild fixed
      fixed = new Set();
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) if(grid[r][c]!==0) fixed.add(keyOf(r,c));

      render();
      saveGame(true);
      toast("Reset");
    }

    function undo(){
      if(undoStack.length===0) return;
      const e = undoStack.pop();

      if(e.type==="place" || e.type==="erase" || e.type==="hint"){
        grid[e.r][e.c] = e.prev;
        notes[e.r][e.c] = new Set(e.prevNotes || []);
      } else if(e.type==="note"){
        notes[e.r][e.c] = new Set(e.prevNotes || []);
      } else if(e.type==="solve" || e.type==="reset" || e.type==="finishAll"){
        grid = copyGrid(e.prevGrid);
        notes = deserializeNotes(e.prevNotes);
      }
      render();
      saveGame(true);
    }

    function cycleDifficulty(){
      difficulty =
        (difficulty==="Easy") ? "Medium" :
        (difficulty==="Medium") ? "Hard" :
        (difficulty==="Hard") ? "Impossible" :
        "Easy";
      $("#diffBtn").textContent = difficulty;
      toast(difficulty);
    }

    function newGame(){
      const gen = generatePuzzle(difficulty);
      initial = copyGrid(gen.puzzle);
      solution = copyGrid(gen.sol);
      grid = copyGrid(initial);

      fixed = new Set();
      for(let r=0;r<9;r++) for(let c=0;c<9;c++) if(grid[r][c]!==0) fixed.add(keyOf(r,c));

      resetNotes();
      undoStack = [];
      strikes = 0;
      gameOver = false;

      setSelected(0,0);
      startTimer();
      render();
      saveGame(true);
      toast(`New ${difficulty} game`);
    }

    // -------- Keyboard support (optional) --------
    function onKey(e){
      const k = e.key;
      if(k>="1" && k<="9"){
        const n = Number(k);
        if($("#notesToggle").checked) toggleNoteDigit(n);
        else placeDigit(n);
        return;
      }
      if(k==="Backspace" || k==="Delete"){ erase(); return; }
      if(k==="n"){ $("#notesToggle").checked = !$("#notesToggle").checked; render(); return; }

      if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(k)){
        e.preventDefault();
        let {r,c} = selected;
        if(k==="ArrowUp") r = clamp(r-1,0,8);
        if(k==="ArrowDown") r = clamp(r+1,0,8);
        if(k==="ArrowLeft") c = clamp(c-1,0,8);
        if(k==="ArrowRight") c = clamp(c+1,0,8);
        setSelected(r,c);
      }
    }

    // -------- Wire UI --------
    $("#newBtn").addEventListener("click", newGame);
    $("#diffBtn").addEventListener("click", () => { cycleDifficulty(); newGame(); });
    $("#undoBtn").addEventListener("click", undo);
    $("#eraseBtn").addEventListener("click", erase);
    $("#hintBtn").addEventListener("click", giveHint);
    $("#solveBtn").addEventListener("click", solveNow);
    $("#resetBtn").addEventListener("click", resetToInitial);
    $("#saveBtn").addEventListener("click", () => saveGame(false));
    $("#loadBtn").addEventListener("click", loadGame);
    $("#finishBtn").addEventListener("click", finishRest);

    $("#notesToggle").addEventListener("change", render);
    $("#mistakeToggle").addEventListener("change", render);
    document.addEventListener("keydown", onKey);

    // init
    $("#diffBtn").textContent = difficulty;
    newGame();
  })();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
